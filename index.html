<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Officina Lucignolo — Cere Ribelli</title>
  <meta name="description" content="Officina Lucignolo." />
  <meta name="keywords" content="cere ribelli" />
  <meta name="author" content="Officina Lucignolo" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://www.officinalucignolo.it/" />

  <meta property="og:title" content="Officina Lucignolo" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.officinalucignolo.it/" />
  <meta property="og:locale" content="it_IT" />
  <meta property="og:image" content="https://officinalucignolo.github.io/Image01.jpeg" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #111110;
      color: #f1efe8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .header {
      border-bottom: 1px solid #444441;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .tagline {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 400;
      color: #f1efe8;
      letter-spacing: 2px;
      margin-bottom: 0.4rem;
    }

    .claim {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888780;
      margin-top: 0.4rem;
    }

    .image-wrapper {
      width: 100%;
      max-width: 560px;
      margin: 0 auto 2rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #444441;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .description {
      font-size: 16px;
      line-height: 1.9;
      color: #b4b2a9;
      margin-bottom: 2rem;
    }

    .description strong {
      color: #f1efe8;
      font-weight: 400;
      font-style: italic;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .tag {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      padding: 5px 14px;
      border: 1px solid #444441;
      border-radius: 999px;
      color: #888780;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer {
      border-top: 1px solid #444441;
      padding-top: 1.2rem;
    }

    .domain {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #5f5e5a;
    }
  </style>
</head>
<body>

  <div class="container">

    <header class="header">
      <p class="tagline">Alchimia d'Eccellenza</p>
      <h1>Officina Lucignolo</h1>
      <p class="claim">Cere Ribelli — Fuori dagli Schemi</p>
	  <p class="claim">Progetto Privato</p>
    </header>

    <main>

      <div class="image-wrapper">
        <img
          src="Image01.jpeg"
          alt="Officina Lucignolo"
          width="1200"
          height="800"
          loading="eager"
        />
      </div>
    </main>

    <footer class="footer">
      <p class="domain">officinalucignolo.it</p>
    </footer>

  </div>

</body>
</html>
